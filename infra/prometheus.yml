global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: "agents"
    static_configs:
      # Local development (agent running on host)
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "devops-assistant"
      # Docker deployment (agent running in container)
      # - targets: ["devops-assistant:9100"]
      #   labels:
      #     service: "devops-assistant"
      # - targets: ["slack-bot:9100"]
      #   labels:
      #     service: "slack-bot"
