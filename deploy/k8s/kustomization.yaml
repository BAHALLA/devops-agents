apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orrery

commonLabels:
  app.kubernetes.io/part-of: orrery
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # NOTE: secret.example.yaml is a template. Create the real Secret
  # out-of-band (External Secrets Operator, Sealed Secrets, or `kubectl
  # create secret`) and omit it from this list.
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

images:
  - name: ghcr.io/bahalla/orrery
    newTag: v0.1.2
