apiVersion: v1
kind: ServiceAccount
metadata:
  name: orrery-assistant
  namespace: orrery
  labels:
    app.kubernetes.io/name: orrery-assistant
    app.kubernetes.io/part-of: orrery
---
# Read-only access for the k8s_health_agent tools (read-only deployments,
# pods, nodes, events). Destructive operations (rollback, scale) are gated
# by the RBAC/guardrails layer in code, but should not have cluster-admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orrery-assistant-read
  labels:
    app.kubernetes.io/name: orrery-assistant
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "events", "nodes", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
# Write access is a SEPARATE ClusterRole so it can be omitted in production
# environments where remediation should be human-in-the-loop only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orrery-assistant-write
  labels:
    app.kubernetes.io/name: orrery-assistant
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orrery-assistant-read
subjects:
  - kind: ServiceAccount
    name: orrery-assistant
    namespace: orrery
roleRef:
  kind: ClusterRole
  name: orrery-assistant-read
  apiGroup: rbac.authorization.k8s.io
